# Deploy tasks load NETWORK and other vars from an env file.
# Override ENV_FILE to use a different environment, e.g.:
#   ENV_FILE=.bsc-testnet.env mise run deploy-escrow

[tasks.install]
description = "Install dependencies using soldeer"
run = "forge soldeer install"

[tasks.build]
description = "Build Solidity contracts using forge"
run = "forge build"

[tasks.test]
description = "Test Solidity contracts using forge"
run = "forge test"

[tasks.fmt]
description = "Format Solidity code"
run = "forge fmt"

[tasks.lint]
description = "Lint Solidity code"
run = "forge lint"

[tasks.export-abi]
description = "Export contracts ABI to ./abi-export"
depends = ["build"]
run = '''
echo 'Exporting ABI for intent contracts'
mkdir -p ./abi-export
rm -rf ./abi-export/*.json
for contract in LayerZeroRouter ERC20 SolverEscrow Auction; do
  cat ./out/${contract}.sol/${contract}.json | jq -r '.abi' > ./abi-export/${contract}.json
done
'''

[tasks.clean]
description = "Clean up forge artifacts"
run = "forge clean"

[tasks.clean-all]
description = "Clean all build artifacts, and caches"
depends = ["clean"]
run = '''
forge soldeer clean
rm -rf ./out ./build ./cache
'''

# Deploy tasks (require NETWORK + keys in $ENV_FILE, default .env)

[tasks.deploy-createx]
description = "Deploy CreateX deterministic factory"
run = '''
set -a; f="${ENV_FILE:-.env}"; [ -f "$f" ] && . "$f"; set +a
forge script script/0_DeployCreateX.s.sol:DeployCreateXDeterministic --rpc-url "$NETWORK" --broadcast --verify --slow -vvv
'''

[tasks.deploy-escrow]
description = "Deploy SolverEscrow"
run = '''
set -a; f="${ENV_FILE:-.env}"; [ -f "$f" ] && . "$f"; set +a
forge script script/1_DeploySolverEscrow.s.sol:DeploySolverEscrow --rpc-url "$NETWORK" --broadcast --verify --slow --legacy -vvv --skip-simulation
'''

[tasks.deploy-auction]
description = "Deploy Auction"
run = '''
set -a; f="${ENV_FILE:-.env}"; [ -f "$f" ] && . "$f"; set +a
forge script script/2_DeployAuction.s.sol:DeployAuction --rpc-url "$NETWORK" --broadcast --verify --slow --legacy -vvv
'''

[tasks.configure-all]
description = "Run ConfigureAll"
run = '''
set -a; f="${ENV_FILE:-.env}"; [ -f "$f" ] && . "$f"; set +a
forge script script/4_ConfigureAll.s.sol:ConfigureAll --rpc-url "$NETWORK" --broadcast --slow --legacy -vvv --skip-simulation
'''

[tasks.deploy-all]
description = "Deploy everything"
run = '''
set -a; f="${ENV_FILE:-.env}"; [ -f "$f" ] && . "$f"; set +a
forge script script/DeployAll.s.sol:DeployAll --rpc-url "$NETWORK" --broadcast --slow --legacy -vvv --skip-simulation
'''

[tasks.deploy-router]
description = "Deploy composition Router (talks to the ERC7786Bridge hub)"
run = '''
set -a; f="${ENV_FILE:-.env}"; [ -f "$f" ] && . "$f"; set +a
forge script script/3_DeployRouter.s.sol:DeployRouter --rpc-url "$NETWORK" --broadcast --verify --slow --legacy -vvv
'''

[tasks.configure-router]
description = "Register remote Routers (per REMOTE_CHAIN_IDS)"
run = '''
set -a; f="${ENV_FILE:-.env}"; [ -f "$f" ] && . "$f"; set +a
forge script script/ConfigureRouter.s.sol:ConfigureRouter --rpc-url "$NETWORK" --broadcast --slow --legacy -vvv --skip-simulation
'''
