[profile.default]
solc_version = '0.8.30'
evm_version = 'cancun'
src = 'contracts'
out = 'out'
test = 'test/foundry'
cache_path = 'cache/foundry'
verbosity = 3
optimizer = true
optimizer_runs = 10000
via_ir = true
libs = [
    'node_modules/@layerzerolabs/toolbox-foundry/lib',
    'node_modules',
]

remappings = [
    # Contract imports from tests
    '@contracts/=contracts/',
    '@test-mocks/=test/mocks/',
    # LayerZero foundry toolbox remappings
    'ds-test/=node_modules/@layerzerolabs/toolbox-foundry/lib/ds-test/',
    'forge-std/=node_modules/@layerzerolabs/toolbox-foundry/lib/forge-std/',
    # LayerZero packages - for contracts (import without /contracts/ prefix)
    '@layerzerolabs/oapp-evm/=node_modules/@layerzerolabs/oapp-evm/contracts/',
    '@layerzerolabs/onft-evm/=node_modules/@layerzerolabs/onft-evm/contracts/',
    # LayerZero packages - for test-devtools (import WITH /contracts/ prefix, map to root)
    '@layerzerolabs/lz-evm-protocol-v2/=node_modules/@layerzerolabs/lz-evm-protocol-v2/',
    '@layerzerolabs/lz-evm-messagelib-v2/=node_modules/@layerzerolabs/lz-evm-messagelib-v2/',
    '@layerzerolabs/lz-evm-v1-0.7/=node_modules/@layerzerolabs/lz-evm-v1-0.7/',
    '@layerzerolabs/test-devtools-evm-foundry/=node_modules/@layerzerolabs/test-devtools-evm-foundry/',
    # Fallback for other LayerZero packages
    '@layerzerolabs/=node_modules/@layerzerolabs/',
    # OpenZeppelin
    '@openzeppelin/=node_modules/@openzeppelin/',
]

[fmt]
multiline_func_header = "params_first_multi"

[fuzz]
runs = 256

[profile.ci]
fuzz = { runs = 1000 }
