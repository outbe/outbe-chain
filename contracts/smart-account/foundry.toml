[profile.default]
src = "src"
out = "out"
libs = ["lib", "dependencies"]
dynamic_test_linking = true  # Enable for faster compilation

# -- Settings for CREATE2, see https://getfoundry.sh/guides/deterministic-deployments-using-create2/
solc = "0.8.30"
evm_version = "Prague"
bytecode_hash = "none"
cbor_metadata = false
always_use_create_2_factory = true
optimizer = true
optimizer_runs = 200
# --

remappings = [
    "@openzeppelin/contracts/=dependencies/openzeppelin-contracts-5.6.1/contracts/",
    "@zerodev/kernel/=dependencies/kernel-3.3.0/src/",
    "@zerodev/kernel-test/=dependencies/kernel-3.3.0/test/",
    "solady/=dependencies/kernel-3.3.0/lib/solady/src/",
    "ExcessivelySafeCall/=dependencies/kernel-3.3.0/lib/ExcessivelySafeCall/src/",
    "forge-std/=dependencies/forge-std-1.16.1/src/"
]

# Compiler settings
via_ir = true

# Silence warnings from third-party submodules under lib/ (e.g. lib/kernel).
ignored_warnings_from = ["lib"]

# Testing configuration
gas_reports = ["*"]
fs_permissions = [{ access = "read-write", path = "./" }]

# Fuzz testing
[fuzz]
runs = 1000
max_test_rejects = 65536

# Invariant testing
[invariant]
runs = 256
depth = 15
fail_on_revert = false
show_metrics = true

# Linting
[lint]
exclude_lints = ["mixed-case-function", "mixed-case-variable", "pascal-case-struct", "unsafe-cheatcode"]

[rpc_endpoints]
ethereum = "${ETHEREUM_RPC_URL}"
bsc = "${BSC_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
local = "http://127.0.0.1:8545"
local-dev = "http://127.0.0.1:8545"
outbe-privnet = "https://eth.p.outbe.net"
outbe-dev = "https://eth.d.outbe.net"
outbe-peira = "https://peira-rpc.outbe.net"
bsc-testnet = "https://bsc-testnet.bnbchain.org"

[etherscan]
ethereum = { key = "${ETHERSCAN_API_KEY}" }
bsc = { key = "${BSCSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
bsc-testnet = { key = "${ETHERSCAN_API_KEY}", url = "https://api-testnet.bscscan.com/api" }
# TODO define Outbe etherscan API
outbe-privnet = { key = "${ETHERSCAN_API_KEY}", url = "TODO" }

[soldeer]
# Remappings are maintained by hand in foundry.toml; do not let soldeer overwrite them.
remappings_generate = false
# Fetch a git dependency's own submodules on restore (kernel needs solady/ExcessivelySafeCall).
recursive_deps = true

[dependencies]
openzeppelin-contracts = { version = "5.6.1", git = "https://github.com/OpenZeppelin/openzeppelin-contracts", tag = "v5.6.1" }
kernel = { version = "3.3.0", git = "https://github.com/zerodevapp/kernel", tag = "v3.3" }
forge-std = { version = "1.16.1", git = "https://github.com/foundry-rs/forge-std", tag = "v1.16.1" }
