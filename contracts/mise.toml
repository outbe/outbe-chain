# Aggregate mise config for the contracts monorepo.
# Fans out to each sub-project. Forge projects use forge/soldeer; intex is a Hardhat hybrid.
# Per-project tasks live in each sub-project's mise.toml (e.g. `mise run export-abi` inside intent,
# or `mise run -C intent deploy-escrow`).

[env]
# Self-contained Forge sub-projects (soldeer deps, forge toolchain).
FORGE_PROJECTS = "intent tokens vault smart-account precompiles"
# Sub-projects that export ABIs (tokens excluded; intex uses yarn).
ABI_PROJECTS = "intent vault smart-account precompiles"

[tasks.install]
description = "Install dependencies using soldeer"
run = '''
set -e
for p in $FORGE_PROJECTS; do echo "==> $p (soldeer)"; (cd "$p" && forge soldeer install); done
echo "==> intex"; (cd intex && mise run install)
'''

[tasks.build]
description = "Build every sub-project"
run = '''
set -e
for p in $FORGE_PROJECTS; do echo "==> build $p"; (cd "$p" && forge build); done
echo "==> build intex"; (cd intex && mise run build)
'''

[tasks.test]
description = "Test every sub-project"
run = '''
set -e
for p in $FORGE_PROJECTS; do echo "==> test $p"; (cd "$p" && forge test); done
echo "==> test intex"; (cd intex && mise run test)
'''

[tasks.export-abi]
description = "Export ABIs in every sub-project that produces them"
run = '''
set -e
for p in $ABI_PROJECTS; do echo "==> export-abi $p"; (cd "$p" && mise run export-abi); done
echo "==> export-abi intex"; (cd intex && mise run export-abi)
'''

[tasks.fmt]
description = "Format every sub-project (forge fmt)"
run = '''
set -e
for p in $FORGE_PROJECTS intex; do echo "==> fmt $p"; (cd "$p" && forge fmt); done
'''

[tasks.lint]
description = "Lint every Forge sub-project (forge lint); intex lints via its own `yarn lint`"
run = '''
set -e
for p in $FORGE_PROJECTS; do echo "==> lint $p"; (cd "$p" && forge lint); done
'''

[tasks.clean]
description = "Clean forge artifacts in every sub-project"
run = '''
set -e
for p in $FORGE_PROJECTS intex; do echo "==> clean $p"; (cd "$p" && forge clean); done
'''

[tasks.clean-all]
description = "Deep-clean every sub-project (artifacts, caches, and deps)"
run = '''
set -e
for p in $FORGE_PROJECTS intex; do echo "==> clean-all $p"; (cd "$p" && mise run clean-all); done
'''
