[tasks.install]
description = "Install dependencies using soldeer"
run = "forge soldeer install"

[tasks.build]
description = "Build Solidity contracts using forge"
run = "forge build"

[tasks.test]
description = "Test Solidity contracts using forge"
run = "forge test"

[tasks.fmt]
description = "Format Solidity code"
run = "forge fmt"

[tasks.lint]
description = "Lint Solidity code"
run = "forge lint"

[tasks.clean]
description = "Clean up forge artifacts"
run = "forge clean"

[tasks.clean-all]
description = "Clean all build artifacts, and caches"
depends = ["clean"]
run = '''
forge soldeer clean
rm -rf ./out ./build ./cache
'''
