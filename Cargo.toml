reth-payload-primitives = { git = "https://github.com/paradigmxyz/reth.git", tag = "v2.2.0" }
reth-payload-validator = { git = "https://github.com/paradigmxyz/reth.git", tag = "v2.2.0" }
reth-primitives-traits = { version = "0.3.1", default-features = false }
reth-codecs = { version = "0.3.1", default-features = false, features = ["alloy"] }
reth-storage-api = { git = "https://github.com/paradigmxyz/reth.git", tag = "v2.2.0" }
reth-transaction-pool = { git = "https://github.com/paradigmxyz/reth.git", tag = "v2.2.0" }
reth-e2e-test-utils = { git = "https://github.com/paradigmxyz/reth.git", tag = "v2.2.0" }

# Commonware (v2026.5.0)
commonware-actor = { git = "https://github.com/commonwarexyz/monorepo", tag = "v2026.5.0" }
commonware-broadcast = { git = "https://github.com/commonwarexyz/monorepo", tag = "v2026.5.0" }
commonware-consensus = { git = "https://github.com/commonwarexyz/monorepo", tag = "v2026.5.0" }
commonware-cryptography = { git = "https://github.com/commonwarexyz/monorepo", tag = "v2026.5.0" }
commonware-p2p = { git = "https://github.com/commonwarexyz/monorepo", tag = "v2026.5.0" }
commonware-runtime = { git = "https://github.com/commonwarexyz/monorepo", tag = "v2026.5.0" }
commonware-storage = { git = "https://github.com/commonwarexyz/monorepo", tag = "v2026.5.0" }
commonware-codec = { git = "https://github.com/commonwarexyz/monorepo", tag = "v2026.5.0" }
commonware-utils = { git = "https://github.com/commonwarexyz/monorepo", tag = "v2026.5.0" }
commonware-math = { git = "https://github.com/commonwarexyz/monorepo", tag = "v2026.5.0" }
commonware-parallel = { git = "https://github.com/commonwarexyz/monorepo", tag = "v2026.5.0" }
commonware-macros = { git = "https://github.com/commonwarexyz/monorepo", tag = "v2026.5.0" }

# BLS
blst = { version = "0.3.13", default-features = false }

# Crypto
argon2 = "0.5"
k256 = { version = "0.13", features = ["ecdsa"] }
keyring = { version = "3", features = ["apple-native", "linux-native"] }
ring = "0.17"
zeroize = "1"
x25519-dalek = { version = "2", features = ["static_secrets"] }
ed25519-dalek = { version = "2", features = ["rand_core", "zeroize"] }
either = "1"

# ZK / Poseidon
outbe-poseidon = { git = "https://github.com/outbe/outbe-poseidon/", tag = "v0.11.0" }
outbe-zk-canonical = { git = "https://github.com/outbe/outbe-circuits.git", tag = "v0.11.0" }
outbe-zk-backend = { git = "https://github.com/outbe/outbe-circuits.git", tag = "v0.11.0" }
outbe-protocol = { git = "https://github.com/outbe/outbe-circuits.git", tag = "v0.11.0" }
ark-bn254 = "0.6"
ark-ff = { version = "0.6", features = ["std"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Compact binary serde format for the node<->enclave wire (postcard): the offer
# ciphertext rides as length-prefixed raw bytes (1x) instead of a JSON number
# array (~4x), and alloy U256/Address/B256 serialize as bytes, not hex strings.
postcard = { version = "1", features = ["use-std"] }

# CLI / IO
clap = { version = "4", features = ["derive"] }
jsonrpsee = { version = "0.26", features = ["server", "macros"] }
reqwest = { version = "0.12", features = ["json"] }

# Runtime
rand = "0.8"
rand_core = { version = "0.6", features = ["getrandom"] }
bytes = "1"
metrics = "0.24"
modular-bitfield = "0.13"

# TEE node <-> enclave transport (Noise-IK over UDS)
snow = "0.9"

# Config
toml = "0.8"

# Testing
tempfile = "3"
proptest = "1"
proptest-state-machine = "0.3"
arbitrary = { version = "1", features = ["derive"] }
criterion = { version = "0.5", features = ["html_reports"] }

# Proc-macro
proc-macro2 = "1"
quote = "1"
syn = { version = "2", features = ["full", "extra-traits"] }

# Text diff (governance proposal vs canon/meta-canon; view-only, deterministic)
similar = "2"

# Utilities
thiserror = "2"
eyre = "0.6"
hex = "0.4"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }
parking_lot = "0.12"
tracing = "0.1"
futures = "0.3"
time = "0.3"

[profile.dev]
debug = "line-tables-only"
split-debuginfo = "unpacked"

[profile.test]
debug = 0

# Points alloy-evm at the outbe fork on GitHub, branch `outbe-precompile-ctx-hook-0.34`,
# which adds the `ctx_dispatch` hook required to expose `&mut Context` to outbe
# stateful precompiles. Pinned by exact commit revision for reproducible builds.
[patch.crates-io]
alloy-evm = { git = "https://github.com/outbedev/alloy-evm", rev = "88e239e601eea130ef6644ffa672970e39332f70" }
