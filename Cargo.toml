[workspace]
members = [
    # blockchain
    "crates/blockchain/macros",
    "crates/blockchain/primitives",
    "crates/blockchain/evm",
    "crates/blockchain/consensus",
    "crates/blockchain/engine",
    "crates/blockchain/rpc",
    "crates/blockchain/txpool",
    "crates/blockchain/node",
    # system
    "crates/system/validatorset",
    "crates/system/slashindicator",
    "crates/system/staking",
    "crates/system/rewards",
    "crates/system/oracle",
    "crates/system/zerofee",
    "crates/system/emissionlimit",
    "crates/system/cycle",
    "crates/system/accounting",
    "crates/system/zkproof",
    "crates/system/tee",
    "crates/system/teeregistry",
    # core outbe
    "crates/core/gratis",
    "crates/core/promis",
    "crates/core/promisfactory",
    "crates/core/tribute",
    "crates/core/nod",
    "crates/core/nodfactory",
    "crates/core/gem",
    "crates/core/gemfactory",
    "crates/core/intex",
    "crates/core/intexfactory",
    "crates/core/desis",
    "crates/core/vaultprovider",
    "crates/core/lysis",
    "crates/core/agentreward",
    "crates/core/credis",
    "crates/core/credisfactory",
    "crates/core/fidelity",
    "crates/core/metadosis",
    "crates/core/promislimit",
    "crates/core/tributefactory",
    "crates/core/gratisfactory",
    "crates/core/gratispool",
    "crates/core/governance",
    "crates/core/e2e",
    "crates/core/common",
    # binaries
    "bin/outbe-chain",
    "bin/outbe-keygen",
    "bin/outbe-cli",
    "bin/outbe-feeder",
    "bin/outbe-tee-enclave",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
publish = false

# Workspace-wide lint levels. Members opt in with `[lints]\nworkspace = true`.
# `unsafe_code = "deny"` makes every `unsafe` a hard error unless the site
# carries an explicit, documented `#[allow(unsafe_code)]` (the one audited
# exception lives in crates/blockchain/evm/src/precompiles.rs). `warnings =
# "deny"` promotes every remaining rustc warning to an error — the "deny + fix"
# posture, matching CI's `clippy -D warnings`.
[workspace.lints.rust]
unsafe_code = "deny"
warnings = "deny"

[workspace.lints.clippy]
# Any retained `unsafe` block must justify itself with a `// SAFETY:` comment.
undocumented_unsafe_blocks = "deny"

[workspace.dependencies]
# Internal — blockchain
outbe-macros = { path = "crates/blockchain/macros" }
outbe-primitives = { path = "crates/blockchain/primitives" }
outbe-evm = { path = "crates/blockchain/evm" }
outbe-consensus = { path = "crates/blockchain/consensus" }
outbe-engine = { path = "crates/blockchain/engine" }
outbe-rpc = { path = "crates/blockchain/rpc" }
outbe-txpool = { path = "crates/blockchain/txpool" }
outbe-node = { path = "crates/blockchain/node" }
# Internal — system
outbe-validatorset = { path = "crates/system/validatorset" }
outbe-slashindicator = { path = "crates/system/slashindicator" }
outbe-staking = { path = "crates/system/staking" }
outbe-rewards = { path = "crates/system/rewards" }
outbe-oracle = { path = "crates/system/oracle" }
outbe-zerofee = { path = "crates/system/zerofee" }
outbe-emissionlimit = { path = "crates/system/emissionlimit" }
