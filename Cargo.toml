# Alloy — core (alloy-rs/core): stays on 1.x
alloy-primitives = { version = "=1.5.7", default-features = false }
alloy-sol-types = { version = "=1.5.7", default-features = false }
alloy-rlp = { version = "0.3.13", default-features = false }

# Alloy — high-level (alloy-rs/alloy): 2.0.x, pinned to match reth v2.2.0
alloy-consensus = { version = "2.0.4", default-features = false }
alloy-eips = { version = "2.0.4", default-features = false }
alloy-genesis = { version = "2.0.4", default-features = false }
alloy-rpc-types-engine = { version = "2.0.4", default-features = false }
alloy-rpc-types-eth = { version = "2.0.4", default-features = false }
alloy-provider = { version = "2.0.4" }
alloy-signer = { version = "2.0.4" }
alloy-signer-local = { version = "2.0.4" }
alloy-network = { version = "2.0.4" }
alloy-transport-http = { version = "2.0.4" }
alloy-rpc-types = { version = "2.0.4" }

# Alloy-EVM (pinned to match reth v2.2.0)
alloy-evm = { version = "0.34.0", default-features = false }

# Revm
revm = { version = "38.0.0", default-features = false, features = ["std"] }

# Reth v2.2.0 (revm 38, alloy 2.0, alloy-evm 0.34)
reth-ethereum = { git = "https://github.com/paradigmxyz/reth.git", tag = "v2.2.0" }
