outbe-promis = { path = "crates/core/promis" }
outbe-promisfactory = { path = "crates/core/promisfactory" }
outbe-tribute = { path = "crates/core/tribute" }
outbe-nod = { path = "crates/core/nod" }
outbe-nodfactory = { path = "crates/core/nodfactory" }
outbe-gem = { path = "crates/core/gem" }
outbe-gemfactory = { path = "crates/core/gemfactory" }
outbe-intex = { path = "crates/core/intex" }
outbe-intexfactory = { path = "crates/core/intexfactory" }
outbe-desis = { path = "crates/core/desis" }
outbe-vaultprovider = { path = "crates/core/vaultprovider" }
outbe-lysis = { path = "crates/core/lysis" }
outbe-agentreward = { path = "crates/core/agentreward" }
outbe-credis = { path = "crates/core/credis" }
outbe-credisfactory = { path = "crates/core/credisfactory" }
outbe-fidelity = { path = "crates/core/fidelity" }
outbe-metadosis = { path = "crates/core/metadosis" }
outbe-promislimit = { path = "crates/core/promislimit" }
outbe-tributefactory = { path = "crates/core/tributefactory" }
outbe-gratisfactory = { path = "crates/core/gratisfactory" }
