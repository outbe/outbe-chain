global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'outbe-chain'
    static_configs:
      - targets:
          - 'localhost:9001'
        labels:
          chain: 'outbe'
          role: 'validator'

    # Reth exports metrics at /metrics by default.
    metrics_path: /metrics

    # Custom outbe metrics to watch:
    #   outbe_blocks_proposed_total           - blocks proposed by this node
    #   outbe_proposed_height                 - latest proposed block height
    #   outbe_finalized_view                  - latest finalized Simplex view
    #   outbe_validator_count                 - number of validators in set
    #   outbe_participation_rate              - ratio of signers to total validators
    #   outbe_views_skipped_total             - skipped views (missed proposers)
    #   outbe_epoch_number                    - current consensus epoch
    #   commonware_p2p_active_peers           - Commonware P2P peer-manager target size
    #   outbe_consensus_reth_tip_hash_match   - consensus tip is available in Reth provider
    #   outbe_dkg_status                      - DKG status (0=idle, 1=in_progress, 2=completed, 3=expired)
    #   outbe_reshares_completed_total        - number of DKG reshares completed
    #   outbe_parent_cert_store_size          - exact-parent certificate handoff records retained
    #   outbe_parent_cert_included_total      - Phase 1 parent certificate metadata included
    #   outbe_parent_cert_missing_total       - proposer slot forfeits/misses due to unavailable certificate
