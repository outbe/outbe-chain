name: CI tokens

on:
  push:
    branches: ["main"]
    paths:
      - ".github/actions/**"
      - ".github/workflows/_contract-ci.yml"
      - "contracts/tokens/**"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/actions/**"
      - ".github/workflows/_contract-ci.yml"
      - "contracts/tokens/**"

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/_contract-ci.yml
    with:
      project: tokens
