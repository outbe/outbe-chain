name: mcp-publish

# Publish the @outbe/mcp package to npm when an `mcp-v*` tag is pushed.
# The tag version MUST match mcp/package.json "version" (e.g. tag mcp-v0.1.0).
#
# Requirements:
#   - repo secret NPM_TOKEN = an npm token able to publish @outbe/mcp without an
#     interactive OTP (Automation token, or a granular token with 2FA bypass).
#     A token that still requires OTP will fail the publish step with EOTP.
# No manual `npm publish` — push the tag and CI does it.

on:
  push:
    tags:
      - "mcp-v*"

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#mcp-v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "tag=$TAG_VERSION package.json=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag mcp-v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
