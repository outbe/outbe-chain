name: outbe-chain
contracts_folder: contracts/vault

networks:
  custom:
    - name: localhost
      ecosystem: ethereum
      chain_id: 54322345
      default_provider: node

node:
  ethereum:
    localhost:
      uri: http://127.0.0.1:8545

plugins:
  - name: solidity

compile: &compile_defaults
  include_dependencies: false
  exclude:
    - "**/abi-export/**"
    - "**/broadcast/**"
    - "**/cache/**"
    - "**/data/**"
    - "**/dependencies/**"
    - "**/examples/**"
    - "**/ignition/**"
    - "**/node_modules/**"
    - "**/out/**"
    - "**/script/**"
    - "**/scripts/**"
    - "**/tasks/**"
    - "**/test/VaultProviderTest.sol"
    - "**/*.cjs"
    - "**/*.config.json"
    - "**/*.js"
    - "**/*.json"
    - "**/*.lock"
    - "**/*.map"
    - "**/*.mjs"
    - "**/*.toml"
    - "**/*.ts"

solidity: &solidity_defaults
  version: "0.8.30"
  via_ir: true
  optimize: true
  optimization_runs: 10000
  evm_version: prague
  import_remapping:
    - "@openzeppelin/contracts/=contracts/vault/dependencies/openzeppelin-contracts-5.6.1/contracts/"
    - "@openzeppelin/contracts-upgradeable/=contracts/vault/dependencies/openzeppelin-contracts-upgradeable-5.6.1/contracts/"
