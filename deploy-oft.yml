name: 05. oft

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: environment
        required: true
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    outputs:
      USDT0_OFT_TOKEN:
        description: Deployed or reused USDT0 OFT token address
        value: ${{ jobs.deploy.outputs.USDT0_OFT_TOKEN }}

env:
  APP_CONFIG_DIR: outbe-oft
  PROJECT_NAME: outbe
  CHAIN_REPOSITORY: outbe-chain
  CHAIN_BRANCH: main
  CHAIN_OFT_WORKDIR: contracts/oft

permissions:
  contents: read

jobs:
  deploy:
    runs-on: depot-ubuntu-24.04
    environment: ${{ inputs.environment || github.event.inputs.environment }}
    outputs:
      USDT0_OFT_TOKEN: ${{ steps.export-outputs.outputs.USDT0_OFT_TOKEN }}

    steps:
      - name: Checkout deploy repository
        uses: actions/checkout@v6

      - name: Load committed config
        shell: bash
        run: |
          set -euo pipefail

          common_config="apps/${APP_CONFIG_DIR}/common.env"
          env_config="apps/${APP_CONFIG_DIR}/${{ inputs.environment || github.event.inputs.environment }}.env"

          if [[ -f "$common_config" ]]; then
            grep -Ev '^(#|$)' "$common_config" >> "$GITHUB_ENV" || true
          fi

          if [[ ! -f "$env_config" ]]; then
            echo "Missing config file: $env_config" >&2
            exit 1
          fi

          grep -Ev '^(#|$)' "$env_config" >> "$GITHUB_ENV" || true

          {
            echo "APP_CONFIG_DIR=${APP_CONFIG_DIR}"
            echo "PROJECT_NAME=${PROJECT_NAME}"
            echo "CHAIN_REPOSITORY=${CHAIN_REPOSITORY}"
            echo "CHAIN_BRANCH=${CHAIN_BRANCH}"
            echo "CHAIN_OFT_WORKDIR=${CHAIN_OFT_WORKDIR}"
          } >> "$GITHUB_ENV"

      - name: Checkout outbe-chain repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.PROJECT_NAME }}/${{ env.CHAIN_REPOSITORY }}
          ref: ${{ env.CHAIN_BRANCH }}
          path: source-outbe-chain
          submodules: false

      - name: Initialize outbe-chain submodules
        shell: bash
        run: |
          set -euo pipefail

          cd source-outbe-chain
          git submodule sync --recursive
          git -c http.https://github.com/.extraheader= submodule update --init --recursive

      - name: Set up Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Restore Foundry dependencies
        shell: bash
        working-directory: source-outbe-chain/${{ env.CHAIN_OFT_WORKDIR }}
        run: forge soldeer install

      - name: Build contracts
        shell: bash
        working-directory: source-outbe-chain/${{ env.CHAIN_OFT_WORKDIR }}
        run: forge build

      - name: Run OFT flow
        shell: bash
        working-directory: source-outbe-chain/${{ env.CHAIN_OFT_WORKDIR }}
        env:
          PRIVATE_KEY: ${{ secrets.OUTBE_DEPLOYER_PRIVATE_KEY }}
          FAUCET_PRT_KEY: ${{ secrets.FAUCET_PRT_KEY }}
        run: |
          set -euo pipefail
          set -o pipefail

          required_vars=(DEPLOYER_ADDRESS SRC_RPC OUTBE_RPC BSC_EID OUTBE_EID LZ_ENDPOINT BSC_OFT_ADAPTER)
          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Required variable is empty: $var_name" >&2
              exit 1
            fi
          done

          if [[ -z "${PRIVATE_KEY:-}" ]]; then
            echo "Required secret is empty: OUTBE_DEPLOYER_PRIVATE_KEY" >&2
            exit 1
          fi

          extract_address_from_log() {
            local label="$1"
            local log_file="$2"
            local value

            value=$(sed -nE "s/.*${label}=[[:space:]]*(0x[0-9a-fA-F]{40}).*/\\1/p" "$log_file" | tail -n 1)

            if [[ -z "$value" ]]; then
              echo "Unable to parse ${label} from forge output." >&2
              exit 1
            fi

            echo "$value"
          }

          echo "Step 1: Deploy Outbe OFT"
          deploy_outbe_log=$(mktemp)
          forge script script/usdt0/OFTDeploy.s.sol:OFTDeploy \
            --sig "deployTarget()" \
            --rpc-url "$OUTBE_RPC" \
            --broadcast \
            -vvvv 2>&1 | tee "$deploy_outbe_log"

          USDT0_OFT_TOKEN=$(extract_address_from_log "USDT0_OFT_TOKEN" "$deploy_outbe_log")
          rm -f "$deploy_outbe_log"

          export USDT0_OFT_TOKEN
          echo "USDT0_OFT_TOKEN=$USDT0_OFT_TOKEN"
          echo "USDT0_OFT_TOKEN=$USDT0_OFT_TOKEN" >> "$GITHUB_ENV"

          echo "Step 2: Configure source peer"
          forge script script/usdt0/OFTDeploy.s.sol:OFTDeploy \
            --sig "configureSourcePeer()" \
            --rpc-url "$SRC_RPC" \
            --broadcast \
            -vvvv 2>&1 | tee configure-source-peer.log

          echo "Step 3: Configure Outbe peer"
          forge script script/usdt0/OFTDeploy.s.sol:OFTDeploy \
            --sig "configureTargetPeer()" \
            --rpc-url "$OUTBE_RPC" \
            --broadcast \
            -vvvv 2>&1 | tee configure-outbe-peer.log

          echo "Step 4: Verify peer wiring"
          cast call "$BSC_OFT_ADAPTER" "peers(uint32)(bytes32)" "$OUTBE_EID" --rpc-url "$SRC_RPC" | tee verify-source-peer.log
          cast call "$USDT0_OFT_TOKEN" "peers(uint32)(bytes32)" "$BSC_EID" --rpc-url "$OUTBE_RPC" | tee verify-outbe-peer.log

          echo "Step 5: Configure enforced options"
          forge script script/usdt0/OFTDeploy.s.sol:OFTDeploy \
            --sig "setSourceOptions()" \
            --rpc-url "$SRC_RPC" \
            --broadcast \
            -vvvv 2>&1 | tee configure-source-options.log

          forge script script/usdt0/OFTDeploy.s.sol:OFTDeploy \
            --sig "setTargetOptions()" \
            --rpc-url "$OUTBE_RPC" \
            --broadcast \
            -vvvv 2>&1 | tee configure-outbe-options.log

          echo "Step 6: Verify options"
          cast call "$BSC_OFT_ADAPTER" "enforcedOptions(uint32,uint16)(bytes)" "$OUTBE_EID" 1 --rpc-url "$SRC_RPC" | tee verify-source-options.log
          cast call "$USDT0_OFT_TOKEN" "enforcedOptions(uint32,uint16)(bytes)" "$BSC_EID" 1 --rpc-url "$OUTBE_RPC" | tee verify-outbe-options.log

          echo "Step 7: Fund faucet (USDT on BSC + USDT0 via bridge on Outbe)"
          # USDT0 has no public mint; the only way to create USDT0 supply is an inbound
          # bridge message. So the faucet is funded by minting USDT on BSC and sending it
          # through the adapter to itself, where it is credited as USDT0 on Outbe.
          # The faucet address is derived from FAUCET_PRT_KEY.
          if [[ -z "${FAUCET_PRT_KEY:-}" ]]; then
            echo "FAUCET_PRT_KEY not set; skipping faucet funding."
          else
            LZ_RECEIVE_GAS="${LZ_RECEIVE_GAS:-1000000}"
            AMT=10000000000000   # 10,000,000 USDT (6 decimals)
            FAUCET=$(cast wallet address "$FAUCET_PRT_KEY")
            TO="0x000000000000000000000000${FAUCET#0x}"                  # address -> bytes32
            OPTS="0x000301001101$(printf '%032x' "$LZ_RECEIVE_GAS")"     # type-3 lzReceive gas
            echo "  faucet: $FAUCET"

            echo "  7a: mint USDT to faucet on BSC (BSC supply + bridge amount)"
            cast send "$USDT_TOKEN" "mint(address,uint256)" "$FAUCET" "$((AMT * 2))" \
              --rpc-url "$SRC_RPC" --private-key "$FAUCET_PRT_KEY"

            echo "  7b: approve adapter"
            cast send "$USDT_TOKEN" "approve(address,uint256)" "$BSC_OFT_ADAPTER" "$AMT" \
              --rpc-url "$SRC_RPC" --private-key "$FAUCET_PRT_KEY"

            echo "  7c: bridge USDT -> USDT0 to faucet on Outbe"
            SP="($OUTBE_EID,$TO,$AMT,$AMT,$OPTS,0x,0x)"
            FEE=$(cast call "$BSC_OFT_ADAPTER" \
              "quoteSend((uint32,bytes32,uint256,uint256,bytes,bytes,bytes),bool)((uint256,uint256))" \
              "$SP" false --rpc-url "$SRC_RPC" | grep -oE '[0-9]+' | head -1)
            echo "  LZ native fee: $FEE"
            cast send "$BSC_OFT_ADAPTER" \
              "send((uint32,bytes32,uint256,uint256,bytes,bytes,bytes),(uint256,uint256),address)" \
              "$SP" "($FEE,0)" "$FAUCET" \
              --value "$FEE" --rpc-url "$SRC_RPC" --private-key "$FAUCET_PRT_KEY" | tee fund-faucet.log

            echo "  faucet USDT (BSC):   $(cast call "$USDT_TOKEN" "balanceOf(address)(uint256)" "$FAUCET" --rpc-url "$SRC_RPC")"
            echo "  faucet USDT0 (Outbe, pending bridge delivery): $(cast call "$USDT0_OFT_TOKEN" "balanceOf(address)(uint256)" "$FAUCET" --rpc-url "$OUTBE_RPC")"
          fi

      - name: Export workflow outputs
        id: export-outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "USDT0_OFT_TOKEN=${USDT0_OFT_TOKEN:-}" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          workdir="source-outbe-chain/${CHAIN_OFT_WORKDIR}"

          {
            echo "## outbe-oft - \`deploy\` on \`${{ inputs.environment || github.event.inputs.environment }}\`"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Environment | \`${{ inputs.environment || github.event.inputs.environment }}\` |"
            echo "| Action | \`deploy\` |"
            echo "| Source RPC | \`$SRC_RPC\` |"
            echo "| Outbe RPC | \`$OUTBE_RPC\` |"
            echo "| BSC EID | \`$BSC_EID\` |"
            echo "| Outbe EID | \`$OUTBE_EID\` |"
            echo "| Commit | \`${GITHUB_SHA::8}\` |"
            echo ""
            echo "### Addresses"
            echo ""
            echo "| Name | Value |"
            echo "|------|-------|"
            echo "| USDT_TOKEN | \`${USDT_TOKEN:-}\` |"
            echo "| BSC_OFT_ADAPTER | \`${BSC_OFT_ADAPTER:-}\` |"
            echo "| USDT0_OFT_TOKEN | \`${USDT0_OFT_TOKEN:-}\` |"
            echo ""
            echo "### Logs"
            echo '```'
            if [[ -d "$workdir" ]]; then
              find "$workdir" -maxdepth 1 -name '*.log' -print0 | sort -z | while IFS= read -r -d '' log_file; do
                echo "== $(basename "$log_file") =="
                tail -n 20 "$log_file"
                echo
              done
            else
              echo "Source workdir was not created. Check earlier failed steps."
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
