[package]
name = "outbe-primitives-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
outbe-primitives = { path = ".." }
alloy-primitives = "1"

[[bin]]
name = "fuzz_participation_decode"
path = "fuzz_targets/fuzz_participation_decode.rs"
test = false
doc = false
bench = false

# Keep the cargo-fuzz package independent from the repository workspace. Cargo
# otherwise treats this nested manifest as an unlisted workspace member and
# refuses to build any target from it.
[workspace]
