[package]
name = "outbe-gratisfactory"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
outbe-primitives = { workspace = true, features = ["test-utils"] }
outbe-gratis.workspace = true
outbe-promis.workspace = true
outbe-fidelity.workspace = true
alloy-primitives.workspace = true
alloy-sol-types.workspace = true
thiserror.workspace = true

[dev-dependencies]
