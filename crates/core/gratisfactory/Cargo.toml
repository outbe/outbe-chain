# (replaces the old gratispool `with_verifier_outcome` stubbing). `test-enclave`
# is unioned into the gratis dep for test builds.
outbe-gratis = { workspace = true, features = ["test-enclave"] }
outbe-tee.workspace = true
outbe-tee-enclave.workspace = true

[lints]
workspace = true
