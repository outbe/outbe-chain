[package]
name = "outbe-zkproof"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
outbe-primitives.workspace = true
alloy-primitives.workspace = true
tracing.workspace = true
thiserror.workspace = true

# Poseidon-BN254 hash (same Circom parameter set as wallets/CLI).
outbe-poseidon.workspace = true
ark-bn254.workspace = true
ark-ff.workspace = true

# ZK proof verification (UltraHonkKeccak via vendored Barretenberg FFI).
# Mandatory dependency — `cmake` + `clang` C++17 toolchain required at
# build time.
outbe-zk-canonical.workspace = true
outbe-zk-circuit-noir.workspace = true

# Developer tooling: the `regen_ownership_fixture` example produces the
# OWNERSHIP proof bytes that `tests/fixtures/ownership.bin` ships.
# Re-run whenever `outbe-circuits` or its Noir/Barretenberg backend
# bumps something that changes the OWNERSHIP combined-proof format.
[dev-dependencies]
outbe-crypto-common.workspace = true
rand.workspace = true

[lints]
workspace = true
