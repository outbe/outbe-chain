[package]
name = "outbe-accounting"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

# V2 Phase 1 accounting-progress runtime module.
#
# Owns the persistent slot `last_accounted_block_number: u64` at
# `ACCOUNTING_PROGRESS_ADDRESS = 0x...EE04`. System-only: no precompile
# dispatch is registered, so user CALLs cannot reach this address. Only
# the V2 executor Phase 1 path may write slot 0.

[dependencies]
outbe-macros.workspace = true
outbe-primitives.workspace = true

alloy-primitives.workspace = true
alloy-sol-types.workspace = true
tracing.workspace = true

[dev-dependencies]
outbe-primitives = { workspace = true, features = ["test-utils"] }
# Dev-only: assert against the executor's real precompile/marker address sets
# instead of scanning source text. (evm → accounting is a normal dep; this
# dev-dep back-edge is a cycle Cargo permits for dev-dependencies.)
outbe-evm = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["alloy-sol-types"]

[lints]
workspace = true
